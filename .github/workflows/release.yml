name: restaurants-api-cd

on:
  push:
    branches:
      - main
  workflow_dispatch: 


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Publish
        run: dotnet publish ./src/restaurants.api/restaurants.api.csproj -o ${{env.DOTNET_ROOT}}/api --no-build
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: api-artifact
          path: ${{env.DOTNET_ROOT}}/api
          
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v3.1.0
        with:
          name: api-artifact
      - name: Azure WebApp
        uses: Azure/webapps-deploy@v2.2.19
        with:
          app-name: 'restaurants-app-api-dev'
          publish-profile: ${{ secrets.PUBLISH_PROFILE_DEV }}
         
